# .goreleaser.yaml  (GoReleaser v2)
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: caseforge
    main: ./main.go
    binary: caseforge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: caseforge
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - Merge pull request
      - Merge branch

brews:
  - name: caseforge
    repository:
      owner: testmind-hq
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/testmind-hq/caseforge"
    description: "AI-powered HTTP API test-case generator from OpenAPI specs"
    license: "Apache-2.0"
    test: |
      system "#{bin}/caseforge", "--version"
    install: |
      bin.install "caseforge"
