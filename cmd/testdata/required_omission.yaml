openapi: "3.0.3"
info: { title: Required Omission Test, version: "1" }
paths:
  /users:
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name]
              properties:
                email: { type: string, format: email }
                name: { type: string }
                age: { type: integer }
            examples:
              validUser:
                summary: A valid user
                value:
                  email: "test@example.com"
                  name: "Alice"
                  age: 30
      responses:
        "201": { description: created }
