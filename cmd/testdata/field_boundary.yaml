openapi: "3.0.3"
info: { title: Field Boundary Test, version: "1" }
paths:
  /orders:
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
                  minimum: 1
                  maximum: 100
                address:
                  type: object
                  properties:
                    zip:
                      type: string
                      minLength: 5
                      maxLength: 10
      responses:
        "201": { description: created }
